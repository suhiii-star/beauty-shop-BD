<!DOCTYPE html>
<html lang="en">
<head>
    <title>Products - Beauty Shop</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="assets/css/style.css">
<script defer src="assets/js/static-store.js"></script>
<script defer src="assets/js/static-pages.js"></script>

</head>
<body>

<header class="site-header">
    <div class="nav-wrap">
        <a class="logo" href="index.html">Beauty<span>Shop</span></a>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <nav class="nav-menu" id="navMenu">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart <span class="badge" id="cartCount">0</span></a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
            <a href="admin-demo.html">Admin Demo</a>
        </nav>
    </div>
</header>

<main class="main-container">
    <div class="page-header">
        <h1>Beauty Products</h1>
        <p>Search and filter products by category, skin/hair suitability, and name.</p>
    </div>
    <div class="filter-bar">
        <input id="searchInput" type="search" placeholder="Search product name...">
        <select id="categoryFilter">
            <option value="">All Categories</option>
            <option>Skincare</option>
            <option>Makeup</option>
            <option>Haircare</option>
            <option>Perfume</option>
            <option>Personal Care</option>
        </select>
        <select id="sortFilter">
            <option value="default">Sort: Default</option>
            <option value="low">Price: Low to High</option>
            <option value="high">Price: High to Low</option>
        </select>
        <button class="btn" id="clearFilters">Clear</button>
    </div>
    <div class="product-grid" id="productsGrid"></div>
    <div class="empty-state" id="noProducts" style="display:none;">No products found.</div>
</main>

<footer class="site-footer">
    <strong>Beauty Shop</strong>
    <p>Static GitHub Pages demo version. Full PHP + MySQL version is included in the project files.</p>
</footer>

</body>
</html>
