<!DOCTYPE html>
<html lang="en">
<head>
    <title>Checkout - Beauty Shop</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="assets/css/style.css">
<script defer src="assets/js/static-store.js"></script>
<script defer src="assets/js/static-pages.js"></script>

</head>
<body>

<header class="site-header">
    <div class="nav-wrap">
        <a class="logo" href="index.html">Beauty<span>Shop</span></a>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <nav class="nav-menu" id="navMenu">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart <span class="badge" id="cartCount">0</span></a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
            <a href="admin-demo.html">Admin Demo</a>
        </nav>
    </div>
</header>

<main class="main-container">
    <div class="page-header">
        <h1>Checkout</h1>
        <p>This static version creates a demo order in browser storage. The PHP version saves orders in MySQL.</p>
    </div>
    <div class="checkout-layout">
        <form class="form-card" id="checkoutForm">
            <h2>Delivery Information</h2>
            <div class="form-grid">
                <div>
                    <label for="customerName">Full Name</label>
                    <input id="customerName" required placeholder="Enter your name">
                </div>
                <div>
                    <label for="phone">Phone Number</label>
                    <input id="phone" required placeholder="01XXXXXXXXX">
                </div>
            </div>
            <label for="email">Email</label>
            <input id="email" type="email" required placeholder="example@email.com">
            <label for="address">Delivery Address</label>
            <textarea id="address" rows="4" required placeholder="House, road, area, city"></textarea>
            <button class="btn btn-full" type="submit">Confirm Demo Order</button>
        </form>
        <aside class="summary-card" id="checkoutSummary"></aside>
    </div>
</main>

<footer class="site-footer">
    <strong>Beauty Shop</strong>
    <p>Static GitHub Pages demo version. Full PHP + MySQL version is included in the project files.</p>
</footer>

</body>
</html>
